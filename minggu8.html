<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Grafkom - Benny Hoh</title>
    <style>
        body { 
            margin: 0; 
            padding: 10px; 
            background-color: #f0f0f0; 
            overflow: hidden; 
            font-family: sans-serif; 
        }
        canvas { 
            background-color: #333; 
            display: block; 
            width: 400px; 
            height: 400px; 
            box-shadow: 0 0 5px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_position;
        attribute vec3 a_color;
        varying vec3 v_color;
        uniform vec2 u_resolution;
        uniform mat3 u_matrix;

        void main() {
            vec2 position = (u_matrix * vec3(a_position, 1)).xy;
            vec2 zeroToOne = position / u_resolution;
            vec2 zeroToTwo = zeroToOne * 2.0;
            vec2 clipSpace = zeroToTwo - 1.0;
            gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
            v_color = a_color;
        }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision mediump float;
        varying vec3 v_color;
        void main() {
            gl_FragColor = vec4(v_color, 1);
        }
    </script>

    <script>
        const canvas = document.getElementById("canvas");
        const gl = canvas.getContext("webgl");

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            return shader;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, document.getElementById("vs").text));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, document.getElementById("fs").text));
        gl.linkProgram(program);
        gl.useProgram(program);

        const posLoc = gl.getAttribLocation(program, "a_position");
        const colorLoc = gl.getAttribLocation(program, "a_color");
        const resLoc = gl.getUniformLocation(program, "u_resolution");
        const matLoc = gl.getUniformLocation(program, "u_matrix");

        const posBuffer = gl.createBuffer();
        const colBuffer = gl.createBuffer();

        function createLetterData(type) {
            const positions = [];
            const colors = [];

            function addRect(x, y, w, h, c1, c2) {
                positions.push(x,y, x+w,y, x,y+h, x,y+h, x+w,y, x+w,y+h);
                colors.push(...c1, ...c1, ...c2, ...c2, ...c1, ...c2);
            }

            if (type === 'B') {
                const purp = [0.8, 0.2, 1.0], blue = [0.2, 0.5, 1.0];
                addRect(-40, -60, 20, 120, purp, blue); // Batang kiri
                addRect(-20, -60, 40, 20, purp, purp);  // Atas
                addRect(-20, -10, 35, 20, purp, blue);  // Tengah
                addRect(-20, 40, 40, 20, blue, blue);   // Bawah
                addRect(15, -60, 20, 70, purp, blue);   // Kanan atas
                addRect(15, -10, 20, 70, purp, blue);   // Kanan bawah
            } else {
                const red = [1.0, 0.2, 0.2], orange = [1.0, 0.7, 0.1];
                addRect(-45, -60, 20, 120, red, orange); // Kiri
                addRect(25, -60, 20, 120, red, orange);  // Kanan
                addRect(-25, -10, 50, 20, [1.0, 0.4, 0.15], [1.0, 0.4, 0.15]); // Tengah
            }

            return { 
                pos: new Float32Array(positions), 
                col: new Float32Array(colors),
                count: positions.length / 2
            };
        }

        const letterB = createLetterData('B');
        const letterH = createLetterData('H');
        let angle = 0;

        function draw(data, x, y, rotation) {
            const c = Math.cos(rotation), s = Math.sin(rotation);
            const matrix = [
                c, s, 0,
                -s, c, 0,
                x, y, 1 
            ];
            gl.uniformMatrix3fv(matLoc, false, matrix);

            gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, data.pos, gl.STATIC_DRAW);
            gl.enableVertexAttribArray(posLoc);
            gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

            gl.bindBuffer(gl.ARRAY_BUFFER, colBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, data.col, gl.STATIC_DRAW);
            gl.enableVertexAttribArray(colorLoc);
            gl.vertexAttribPointer(colorLoc, 3, gl.FLOAT, false, 0, 0);

            gl.drawArrays(gl.TRIANGLES, 0, data.count);
        }

        function render() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.clearColor(0.2, 0.2, 0.2, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            angle += 0.02;
            gl.uniform2f(resLoc, canvas.width, canvas.height);

            // Gambar B di sisi kiri canvas
            draw(letterB, canvas.width * 0.3, canvas.height / 2, angle);
            
            // Gambar H di sisi kanan canvas (putar arah berlawanan untuk variasi)
            draw(letterH, canvas.width * 0.7, canvas.height / 2, -angle);

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
